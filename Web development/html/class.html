<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline CSS Example</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px;">

  <p style="background-color: red; color: white; padding: 10px; border-radius: 5px;">
    Lorem ipsum dolor sit amet consectetur adipisicing elit. Deserunt, cum.
  </p>

  <p style="background-color: greenyellow; color: #333; padding: 10px; border-radius: 5px;">
    Lorem ipsum dolor sit amet, consectetur adipisicing elit. Debitis iusto sint deserunt ratione aut distinctio similique ad laudantium in voluptas?
  </p>

  <h1 style="background-color: red; color: white; padding: 10px; border-radius: 5px;">Test 1</h1>
  <h2 style="background-color: greenyellow; color: #333; padding: 10px; border-radius: 5px;">Test 2</h2>

  <table style="width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #fff;">
    <thead>
      <tr>
        <th colspan="3" style="background-color: #4CAF50; color: white; border: 1px solid #ccc; padding: 10px;">Country</th>
      </tr>
      <tr>
        <th style="background-color: #4CAF50; color: white; border: 1px solid #ccc; padding: 10px;">IN</th>
        <th style="background-color: #4CAF50; color: white; border: 1px solid #ccc; padding: 10px;">JP</th>
        <th style="background-color: #4CAF50; color: white; border: 1px solid #ccc; padding: 10px;">CN</th>
      </tr>
    </thead>
    <tbody>
      <tr style="background-color: #f9f9f9;">
        <td style="border: 1px solid #ccc; padding: 10px; text-align: center;">India</td>
        <td style="border: 1px solid #ccc; padding: 10px; text-align: center;">Japan</td>
        <td style="border: 1px solid #ccc; padding: 10px; text-align: center;">
          <iframe 
            src="https://www.youtube.com/embed/oFnIe-RpkE4?si=1VYvrp8LJZwOqsk0" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen
            style="width: 100%; max-width: 450px; height: 250px; border: none;">
          </iframe>
        </td>
      </tr>
    </tbody>
  </table>

</body>
</html>
